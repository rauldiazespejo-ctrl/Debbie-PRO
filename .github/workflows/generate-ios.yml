name: Generate iOS App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate Capacitor iOS Project
        run: npx cap add ios

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ios capacitor.config.json || true
          git commit -m "chore: generar proyecto iOS con Capacitor" || echo "No changes to commit"
          git push
