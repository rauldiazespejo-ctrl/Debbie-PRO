# Despliegue automático a Firebase Hosting (push a main/master o manual).
#
# Configura UNO de estos secretos en GitHub:
#   Settings → Secrets and variables → Actions → Repository secrets
#
# 1) FIREBASE_SERVICE_ACCOUNT (recomendado)
#    Firebase Console → Configuración del proyecto → Cuentas de servicio
#    → Generar nueva clave privada → pegar TODO el JSON en el secreto.
#
# 2) FIREBASE_TOKEN (alternativa)
#    En tu PC: npm i -g firebase-tools && firebase login:ci
#    Pega el token en el secreto.
#
name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Desplegar a Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT" > "${RUNNER_TEMP}/firebase-sa.json"
            export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase-sa.json"
          elif [ -z "${FIREBASE_TOKEN:-}" ]; then
            echo "::error title=Falta autenticación::Añade el secreto FIREBASE_SERVICE_ACCOUNT (JSON) o FIREBASE_TOKEN. Ver comentarios al inicio de .github/workflows/deploy-firebase-hosting.yml"
            exit 1
          fi
          npx --yes firebase-tools@latest deploy --only hosting --project basededatosdebbiepro --non-interactive
